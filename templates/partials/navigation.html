{% load static %}

<nav>
    <section class="logo">
        <a href="/"><img src="{% static 'images/logo.png' %}" alt="Logo"></a>
    </section>

    <section class="menu">
        <span><a href="/">Home</a></span>
        <span><a href="/games/">Games</a></span>
        <span><a href="/genres/">Genres</a></span>
        <span><a href="/platforms/">Platforms</a></span>

        {% if user.is_authenticated %}
            <span><a href="{% url 'profile-details' %}">Profile ({{ user.username }})</a></span>
            <span><a href="{% url 'dashboard' %}">Dashboard</a></span>
            <span><a href="{% url 'logout' %}" class="btn btn-danger">Logout</a></span>
        {% else %}
            <span><a href="{% url 'login' %}" class="btn btn-info">Login</a></span>
            <span><a href="{% url 'register' %}" class="btn btn-danger">Register</a></span>
        {% endif %}
    </section>
</nav>
