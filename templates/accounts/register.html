{% extends 'base.html' %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h1 class="form-title">Register</h1>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-field">
                    {{ field.label_tag }}
                    {{ field }}

                    {% if field.errors %}
                        <div class="field-errors">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="form-actions">
                <button type="submit" class="btn btn-success">Register</button>
                <a href="{% url 'welcome' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

        <p class="form-switch">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</div>
{% endblock %}
